<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LearnOS — Study Pod Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0c10;--bg-elev:#11141b;--card:#18181b;--side:#0f1117;--border:#27272a;
  --accent:#3b82f6;--accent-hover:#2563eb;--text:#fafafa;--sec:#a1a1aa;--muted:#71717a;
  --green:#22c55e;--red:#dc2626;--red-soft:#7f1d1d;--yellow:#eab308;--orange:#f97316;--purple:#a855f7;--blue:#3b82f6;
  --radius:10px;--radius-sm:8px;
}
body{font-family:Lato,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none}
input,select{font-family:inherit;outline:none;border:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* DEMO: compact screen switcher — keeps main UI unobstructed */
.demo-dock{position:fixed;bottom:12px;right:12px;z-index:500;display:flex;flex-wrap:wrap;gap:4px;max-width:min(96vw,520px);justify-content:flex-end}
.demo-dock button{padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--sec);font-size:10px;font-weight:600;cursor:pointer;transition:.15s}
.demo-dock button.on{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.12)}
.demo-dock button:hover{color:var(--text)}
.demo-hint{position:fixed;bottom:12px;left:12px;z-index:500;font-size:10px;color:var(--muted);opacity:.75}

/* APP SHELL */
.shell{flex:1;display:flex;overflow:hidden}

/* ICON SIDEBAR */
.is{width:56px;background:var(--side);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0 12px;flex-shrink:0}
.is .logo{width:28px;height:28px;margin-bottom:18px;color:var(--accent)}
.is .logo svg{width:28px;height:28px}
.ico{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--muted);cursor:pointer;transition:.12s;margin-bottom:4px}
.ico:hover{color:var(--sec);background:rgba(255,255,255,.04)}
.ico.on{background:rgba(59,130,246,.18);color:var(--accent)}
.ico svg{width:20px;height:20px}
.is .gap{flex:1}
.is .bav{width:32px;height:32px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;margin-top:8px;cursor:pointer;box-shadow:0 0 0 2px rgba(0,0,0,.3)}
.is .bav:hover{filter:brightness(1.08)}

/* MODULE SIDEBAR */
.ms{width:200px;background:var(--bg);border-right:1px solid var(--border);padding:16px 10px;flex-shrink:0;overflow-y:auto}
.ms h3{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:14px;padding-left:10px}
.mi{padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;color:var(--sec);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.12s;margin-bottom:2px;border-left:3px solid transparent}
.mi:hover{background:rgba(255,255,255,.04);color:var(--text)}
.mi.on{background:rgba(59,130,246,.12);color:var(--text);font-weight:600;border-left-color:var(--accent)}
.mi .c{font-size:12px;color:var(--muted);font-weight:500}
.mi.on .c{color:var(--sec)}

/* MAIN CONTENT */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* TOPBAR */
.tb{display:flex;align-items:center;min-height:52px;padding:0 20px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;background:rgba(8,9,12,.6);backdrop-filter:blur(8px)}
.bc{font-size:12px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:6px;font-weight:500}
.bc .sep{color:var(--muted);opacity:.7}
.bc .cur{color:var(--text);font-weight:600}
.srch{flex:1;max-width:420px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.srch svg{width:16px;height:16px;color:var(--muted);flex-shrink:0}
.srch input{background:none;color:var(--text);font-size:13px;flex:1;width:0}
.srch input::placeholder{color:var(--muted)}
.srch .k{font-size:10px;color:var(--muted);background:var(--bg);padding:3px 7px;border-radius:6px;font-weight:600;border:1px solid var(--border)}
.xp{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.35);padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:4px;white-space:nowrap}
.tbr{display:flex;align-items:center;gap:2px}
.ti{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:var(--sec);cursor:pointer;transition:.12s}
.ti:hover{background:rgba(255,255,255,.04);color:var(--text)}
.ti svg{width:18px;height:18px}

/* ACTIVE SESSION PILL */
.apill{background:var(--accent);padding:5px 14px 5px 8px;border-radius:999px;font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;margin:0 4px;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.apill:hover{filter:brightness(1.08)}
.apill .pav{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center}
.apill .pav svg{width:14px;height:14px}
.apill .timer{background:rgba(0,0,0,.2);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-left:2px}

/* CONTENT AREA */
.ct{flex:1;display:flex;overflow:hidden}
.cl{flex:1;overflow-y:auto;padding:20px 24px 40px}
.cr{width:340px;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;background:var(--bg)}

/* VIDEO */
.vid{background:linear-gradient(145deg,#0a0a0f,#0f1419);border-radius:var(--radius);position:relative;aspect-ratio:16/9;overflow:hidden;border:1px solid var(--border)}
.vid .tag{position:absolute;top:12px;left:12px;z-index:2;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);padding:6px 12px;border-radius:999px;font-size:12px;color:var(--sec);font-weight:500}
.play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;width:64px;height:64px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 32px rgba(59,130,246,.4);transition:transform .15s}
.play:hover{transform:translate(-50%,-50%) scale(1.05)}
.play.hidden{opacity:0;pointer-events:none}
.play svg{width:26px;height:26px;fill:#fff;margin-left:4px}
.seek-wrap{position:absolute;bottom:44px;left:14px;right:14px;z-index:2}
.seek-r{height:4px;-webkit-appearance:none;appearance:none;width:100%;background:rgba(255,255,255,.12);border-radius:4px;cursor:pointer}
.seek-r::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 0 0 2px rgba(0,0,0,.4);cursor:pointer}
.seek-r::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:0;cursor:pointer}
.vc{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--sec);background:linear-gradient(transparent,rgba(0,0,0,.75))}
.vc button{background:none;border:none;color:inherit;padding:0;display:inline-flex;align-items:center;justify-content:center}
.vc svg{width:18px;height:18px;cursor:pointer;opacity:.9}
.vc svg:hover{opacity:1;color:var(--text)}
.vc .spd{background:rgba(255,255,255,.1);padding:4px 8px;border-radius:6px;font-size:11px;color:var(--text);font-weight:600;cursor:pointer}
.vc-l,.vc-r{display:flex;align-items:center;gap:12px}
.vc-time{font-variant-numeric:tabular-nums;font-weight:500}

/* LESSON META */
.lm{margin-top:18px}
.lm h2{font-size:20px;font-weight:600;margin-bottom:8px;line-height:1.3;letter-spacing:-.02em}
.lm-i{font-size:13px;color:var(--sec);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lm-i .sep{color:var(--border)}
.lm .by{margin-top:6px;font-size:13px}
.lm .by a{color:var(--accent);font-weight:600;text-decoration:none}
.lm .by a:hover{text-decoration:underline}
.profile-pill{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer}
.profile-pill:hover{filter:brightness(1.1)}

.ctabs{display:flex;margin-top:20px;border-bottom:1px solid var(--border);gap:4px}
.ctabs button{padding:10px 16px;font-size:13px;color:var(--muted);font-weight:600;border-bottom:2px solid transparent;transition:.12s;background:none;border-radius:0}
.ctabs button.on{color:var(--text);border-bottom-color:var(--accent)}
.ctabs button:hover{color:var(--text)}
.abt{margin-top:16px;min-height:120px}
.abt h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text)}
.abt p{font-size:13px;color:var(--sec);line-height:1.65}
.abt ul{margin:0;padding-left:18px;color:var(--sec);font-size:13px;line-height:1.6}
.abt li{margin-bottom:6px}
.tags{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tags span{border:1px solid var(--border);padding:6px 14px;border-radius:999px;font-size:12px;color:var(--sec);background:var(--card);cursor:default;transition:.12s}
.tags span:hover{border-color:var(--muted);color:var(--text)}

/* LESSON LIST */
.llh{padding:12px 14px;font-size:13px;font-weight:700;background:var(--card);border-bottom:1px solid var(--border)}
.ll{flex:1;overflow-y:auto}
.lr{display:flex;align-items:center;padding:11px 14px;gap:10px;border-bottom:1px solid rgba(42,45,62,.35);cursor:pointer;transition:.1s}
.lr:hover{background:rgba(255,255,255,.015)}
.lr.now{background:rgba(79,110,247,.07);border-left:3px solid var(--accent)}
.cir{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cir svg{width:11px;height:11px}
.cir.done{border-color:var(--green);background:var(--green)}
.cir.done svg{fill:#fff}
.cir.cur{border-color:var(--accent);position:relative}
.cir.cur::after{content:'';width:12px;height:12px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;position:absolute}
@keyframes spin{to{transform:rotate(360deg)}}
.lr .inf{flex:1;min-width:0}
.lr .inf .n{font-size:10px;color:var(--sec)}
.lr .inf .t{font-size:12px;font-weight:700;margin-top:1px}
.lr .inf .st{font-size:10px;color:var(--accent);margin-top:1px}
.lr .d{font-size:11px;color:var(--sec);flex-shrink:0}

.mpg{padding:12px 14px;background:var(--card);border-top:1px solid var(--border);margin-top:auto}
.mpg h4{font-size:12px;font-weight:700;margin-bottom:7px}
.mpg .bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.mpg .bar .f{height:100%;width:33%;background:var(--accent);border-radius:2px}
.mpg .tx{font-size:11px;color:var(--sec)}

/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}

/* FLOATING POD PANEL — overlays the right column area */
.fp{position:absolute;top:0;right:0;width:280px;background:var(--side);border-left:1px solid var(--border);box-shadow:-4px 0 24px rgba(0,0,0,.3);z-index:40;display:none;flex-direction:column;height:100%;overflow:hidden}
.fp.show{display:flex;animation:slideR .2s ease}
@keyframes slideR{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
.fp-h{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
.fp-h .tl{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13px}
.fp-h .tl svg{width:16px;height:16px;color:var(--sec)}
.fp-x{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--sec);font-size:15px;transition:.12s}
.fp-x:hover{background:var(--border);color:var(--text)}
.fp-b{flex:1;overflow-y:auto;padding:10px 14px}
.fp-f{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border)}
.fp-f a{color:var(--accent);font-size:10px;font-weight:700;cursor:pointer}
.cbtn{background:var(--accent);color:#fff;padding:5px 12px;border-radius:6px;font-size:10px;font-weight:700}

/* SEARCH + FILTERS */
.fps{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 8px;display:flex;align-items:center;gap:5px;margin-bottom:8px}
.fps input{background:none;color:var(--text);font-size:11px;flex:1}
.fps input::placeholder{color:var(--muted)}
.fps svg{width:12px;height:12px;color:var(--muted)}
.fpf{display:flex;gap:6px;margin-bottom:10px}
.fpf select{background:var(--card);color:var(--sec);border:1px solid var(--border);border-radius:5px;padding:4px 6px;font-size:10px;flex:1;-webkit-appearance:none;appearance:none}

/* POD CARD */
.pc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:7px}
.pc-r{display:flex;align-items:center;gap:8px}
.pcav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;flex-shrink:0;background:var(--orange)}
.pc-i{flex:1;min-width:0}
.pc-i h4{font-size:12px;font-weight:700;line-height:1.2}
.pc-i .sub{font-size:10px;color:var(--sec);line-height:1.3}
.jb{background:var(--accent);color:#fff;padding:4px 10px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap}
.jb:hover{background:#3d5bd9}
.jb.joining{background:var(--border);color:var(--sec);pointer-events:none}
.jb.done{background:var(--green)}
.eb{background:var(--border);color:var(--sec);padding:4px 10px;border-radius:5px;font-size:10px;font-weight:700;cursor:default}
.pc-m{display:flex;align-items:center;gap:6px;margin-top:6px}
.tp{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
.tp.g{background:rgba(34,197,94,.1);color:var(--green)}
.tp.r{background:rgba(239,68,68,.1);color:var(--red)}
.mc{font-size:10px;color:var(--sec);display:flex;align-items:center;gap:2px}
.mc svg{width:10px;height:10px}

/* SESSION RIGHT PANEL (replaces lesson list) */
.sr{display:flex;flex-direction:column;height:100%;overflow:hidden}
.sr-h{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sr-h .l{display:flex;align-items:center;gap:5px}
.gdot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sr-h h4{font-size:12px;font-weight:700}
.sr-tm{color:var(--accent);font-size:12px;font-weight:700}
.sr-sect{padding:8px 14px}
.sr-lbl{font-size:9px;letter-spacing:1px;color:var(--sec);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.mr{display:flex;align-items:center;gap:8px;padding:4px 0}
.mr .av{width:26px;height:26px;font-size:9px}
.mr .nm{flex:1;font-size:12px;font-weight:700}
.mr .ms2{font-size:10px;font-weight:700}
.cw{flex:1;overflow-y:auto;padding:0 14px 6px}
.cm{display:flex;gap:6px;margin-bottom:8px;align-items:flex-start}
.cm .av{width:22px;height:22px;font-size:8px;flex-shrink:0}
.cm .cn{font-size:11px;font-weight:700}
.cm .cx{font-size:11px;color:var(--sec);margin-left:3px}
.ci{display:flex;gap:5px;padding:8px 14px;border-top:1px solid var(--border)}
.ci input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:11px}
.ci input::placeholder{color:var(--muted)}
.ci .snd{width:28px;height:28px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci .snd svg{width:12px;height:12px;fill:#fff}
.lv{margin:4px 14px 8px;padding:8px;border-radius:6px;border:1px solid var(--red);color:var(--red);font-size:11px;font-weight:700;text-align:center}
.lv:hover{background:rgba(239,68,68,.06)}

/* EMPTY STATE */
.es{text-align:center;padding:20px 14px}
.es .art{width:48px;height:48px;border-radius:50%;background:var(--border);margin:0 auto 10px;display:flex;align-items:center;justify-content:center}
.es .art svg{width:24px;height:24px;color:var(--sec)}
.es h4{font-size:13px;font-weight:700;margin-bottom:3px}
.es p{font-size:11px;color:var(--sec);margin-bottom:10px}
.es .cta{background:var(--accent);color:#fff;padding:7px 18px;border-radius:6px;font-size:11px;font-weight:700;display:inline-block}
.es .hint{font-size:10px;color:var(--muted);margin-top:6px}

/* MODAL OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(5px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.ov.show{display:flex}
.mdl{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;width:420px;max-width:92vw;text-align:center;position:relative;max-height:88vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.mdl .mx{position:absolute;top:12px;right:12px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--sec);font-size:15px;cursor:pointer}
.mdl .mx:hover{background:var(--border)}

/* JOIN MODAL */
.jm-hdr{background:var(--side);margin:-24px -24px 0;padding:12px 0;border-radius:14px 14px 0 0;font-size:12px;color:var(--text);display:flex;align-items:center;justify-content:center;gap:5px}
.jm-hdr .gd{width:7px;height:7px;border-radius:50%;background:var(--green)}
.jmav{width:56px;height:56px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;margin:18px auto 10px}
.jm h3{font-size:17px;font-weight:700;margin-bottom:3px}
.jm .sub{font-size:12px;color:var(--sec);margin-bottom:1px}
.jm .pills{display:flex;gap:8px;justify-content:center;margin:12px 0 16px}
.jm .pills .gp{background:rgba(34,197,94,.1);color:var(--green);padding:4px 12px;border-radius:14px;font-size:11px;font-weight:700}
.jm .pills .mp{background:var(--side);color:var(--sec);padding:4px 12px;border-radius:14px;font-size:11px;display:flex;align-items:center;gap:3px}
.jm .pills .mp svg{width:11px;height:11px}
.jm .btns{display:flex;gap:8px}
.jm .btns button{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:700}
.jm .btns .jn{background:var(--accent);color:#fff}
.jm .btns .cn{border:1px solid var(--red);color:var(--red)}

/* JOINING */
.ja-ring{width:72px;height:72px;margin:14px auto;position:relative;display:flex;align-items:center;justify-content:center}
.ja-ring .num{font-size:24px;font-weight:700;color:var(--accent)}
.ja-ring svg{position:absolute;inset:0;width:72px;height:72px}
.ja-ring circle{fill:none;stroke-width:3}
.ja-ring .bg{stroke:var(--border)}
.ja-ring .fg{stroke:var(--accent);stroke-linecap:round;transform:rotate(-90deg);transform-origin:center}
.ja-bar{height:3px;background:var(--border);border-radius:2px;margin:14px 30px;overflow:hidden}
.ja-bar .f{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear}
.ja .cancel{color:var(--sec);font-size:12px;cursor:pointer;margin-top:10px;display:inline-block}

/* CREATE POD */
.cp{text-align:left}
.cp h2{font-size:16px;font-weight:700;margin-bottom:14px}
.cp label{font-size:11px;color:var(--sec);display:block;margin-bottom:4px;font-weight:700}
.cp .fi{background:var(--side);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;width:100%;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.cp .fi input{background:none;color:var(--text);flex:1;font-size:12px;border:none}
.cp .fi svg{width:14px;height:14px;color:var(--sec);cursor:pointer}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.tgrid button{padding:7px;border-radius:6px;border:1px solid var(--border);color:var(--sec);font-size:11px;font-weight:600;background:var(--side)}
.tgrid button.on{border-color:var(--accent);background:rgba(79,110,247,.08);color:var(--accent)}
.cp select{background:var(--side);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:11px;width:100%;margin-bottom:12px;-webkit-appearance:none;appearance:none}
.rg{margin-bottom:12px}
.rg .ri{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;color:var(--sec);cursor:pointer}
.rg .ri .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rg .ri.on .dot{border-color:var(--accent)}
.rg .ri.on .dot::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent)}
.rg .ri.on{color:var(--text);font-weight:700}
.cp .sub-btn{width:100%;padding:10px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;margin-top:4px}
.cp .cl2{display:block;text-align:center;color:var(--sec);font-size:12px;margin-top:8px;cursor:pointer}

/* INACTIVE */
.im{text-align:center}
.im .hdr{background:var(--side);margin:-24px -24px 0;padding:10px 0;border-radius:14px 14px 0 0;font-size:12px;color:var(--text);display:flex;align-items:center;justify-content:center;gap:5px}
.im .hdr .yd{width:7px;height:7px;border-radius:50%;background:var(--yellow)}
.im h3{font-size:16px;font-weight:700;margin:16px 0 4px}
.im .desc{font-size:12px;color:var(--sec);margin-bottom:14px}
.im .btns{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.im .btns button{padding:9px 20px;border-radius:7px;font-size:12px;font-weight:700}
.im .btns .yes{background:var(--accent);color:#fff}
.im .btns .no{background:var(--red);color:#fff}
.im .note{font-size:9px;color:var(--muted);line-height:1.5}

/* SESSION END */
.se{text-align:center}
.se .chk{width:44px;height:44px;border-radius:50%;background:var(--green);margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.se .chk svg{width:22px;height:22px;fill:#fff}
.se h2{font-size:18px;font-weight:700;margin-bottom:3px}
.se .sub2{font-size:12px;color:var(--sec);margin-bottom:12px}
.se hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.se .sl{font-size:11px;color:var(--sec);text-align:left;margin-bottom:8px}
.se .em{display:flex;align-items:center;gap:8px;padding:5px 0;text-align:left}
.se .em .av{width:30px;height:30px;font-size:10px}
.se .em .nm{flex:1;font-size:12px;font-weight:700}
.se .em .abtn{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;background:var(--side);border:1px solid var(--border);color:var(--text);cursor:pointer;white-space:nowrap}
.se .em .abtn:hover{border-color:var(--accent)}
.se .em .abtn.sent{background:rgba(34,197,94,.06);border-color:var(--green);color:var(--green);cursor:default}
.se .stats{font-size:11px;color:var(--sec);margin:8px 0}
.se .bb{width:100%;padding:10px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;margin-top:6px}
.se .hl{color:var(--accent);font-size:11px;margin-top:8px;display:inline-block;cursor:pointer}
</style>
</head>
